name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly Monday 02:00 UTC — re-scan in case a new CVE landed against
    # an existing pinned dependency.
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ────────────── gitleaks (CLI, license-free) ──────────────
  # `gitleaks/gitleaks-action@v2` requires a paid license for
  # organization-owned repositories as of late 2025. The gitleaks CLI
  # itself is MIT-licensed and free; we run it directly via the
  # official Docker image so there is no license, no rate limit, and
  # no third-party action in our supply chain for this scan.
  #
  # Rule scope: the default open-source ruleset, plus any project-local
  # overrides in `.gitleaks.toml` and `.gitleaksignore`.
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run gitleaks (Docker, no license required)
        # F7: pin to a versioned tag rather than ``:latest``. Dependabot
        # (.github/dependabot.yml github-actions ecosystem) tracks
        # version drift and opens a PR when a newer release lands; the
        # next hardening pass will replace this with an
        # ``image@sha256:...`` digest.
        env:
          GITLEAKS_VERSION: v8.21.2
        run: |
          docker run --rm -v "${GITHUB_WORKSPACE}:/repo" -w /repo \
            zricethezav/gitleaks:${GITLEAKS_VERSION} detect \
            --source /repo \
            --redact \
            --no-banner \
            --verbose \
            --exit-code 1

  # ────────────── pip-audit ──────────────
  # Scan the locked dependency set for known CVEs. PyPA-maintained
  # tooling that consults the Python Packaging Advisory Database (PyPA)
  # plus OSV.
  pip-audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          cache-suffix: security-pip-audit-py3.13

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --group dev --python 3.13

      - name: Export installed dependency set to requirements.txt
        # pip-audit reads requirements.txt; uv export gives us the
        # exact resolved set, locked to versions, including
        # transitive dependencies.
        run: uv export --no-hashes --no-emit-project --format requirements-txt > /tmp/requirements.txt

      - name: Run pip-audit (uvx — uses our 3.13 toolchain)
        # Direct invocation instead of pypa/gh-action-pip-audit because the
        # action's internal venv picks a Python that can't resolve packages
        # requiring Python >= 3.13 (e.g. kaos-core>=0.1.0a1, a runtime dep).
        # uvx honors the --python we already installed above. F009 #6.
        run: |
          uvx --python 3.13 --from pip-audit pip-audit \
            --requirement /tmp/requirements.txt \
            --strict

  # ────────────── bandit (static code-level security scan) ──────────────
  # F7: catches obvious AST-level antipatterns (yaml.load, eval, hashlib MD5,
  # subprocess shell=True, etc.) that aren't dependency CVEs. Low severity
  # only at high confidence to keep the gate signal-rich.
  bandit:
    name: bandit (static security)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          cache-suffix: security-bandit-py3.13

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Run bandit
        run: |
          uvx --python 3.13 bandit \
            --recursive \
            --skip B101,B404,B603,B607 \
            --severity-level medium \
            --confidence-level medium \
            kaos_office

  # ────────────── integration tests (scheduled / dispatch only) ──────────────
  # F7: integration tests aren't on the default unit gate but should run
  # at least nightly so cross-package regressions surface against main.
  integration:
    name: integration tests
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          cache-suffix: security-integration-py3.13

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Sync dependencies
        # `--extra mcp` brings in kaos-mcp so the
        # `test_mcp_office_pipeline.py` / `test_mcp_xlsx_pipeline.py`
        # integration tests can `import kaos_mcp`. The extra was
        # restored at 0.1.0a3 (see pyproject.toml).
        run: uv sync --group dev --extra mcp --python 3.13

      - name: Run integration tests
        run: uv run pytest tests/integration/ -q --no-cov

  # ────────────── vulture (dead-code detection) ──────────────
  # Reports names vulture is 100% confident are unreachable. The
  # `--ignore-names` list carves out names vulture can't infer from
  # the import graph (framework callbacks, signal handlers, OAuth /
  # OIDC field names accessed by string, MCP `_meta` keys, etc.).
  # Mirrors the pre-commit hook.
  vulture:
    name: vulture (dead-code scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Run vulture
        run: |
          uvx --python 3.13 vulture \
            kaos_office \
            --min-confidence 100 \
            --ignore-names client_id,scopes,authorization_endpoint,token_endpoint,device_authorization_endpoint,url,open_ch,container_tag,message_id,parent_message_id,kwargs,context_id,frame,signum,exc_type,tb
