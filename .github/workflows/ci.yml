name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ────────────── lint ──────────────
  # Separate from tests so format / lint / type failures fail-fast and
  # are easy to spot without combing through test output.
  lint:
    name: Lint
    runs-on: kaos-x64-16core
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          cache-suffix: lint-py3.13

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev --python 3.13

      - name: Ruff format check
        run: uv run ruff format --check kaos_office/ tests/

      - name: Ruff lint
        run: uv run ruff check kaos_office/ tests/

      - name: Type check (ty)
        run: uv run ty check kaos_office/ tests/

  # ────────────── pre-commit ──────────────
  # Catches any drift between the local pre-commit config and the
  # checks above. If a contributor disabled their local hooks, this
  # job still enforces the contract on the PR.
  pre-commit:
    name: Pre-commit hooks
    runs-on: kaos-x64-16core
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          cache-suffix: pre-commit-py3.13

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies (needed by the local ty hook)
        run: uv sync --group dev --python 3.13

      - name: Run pre-commit
        run: uvx pre-commit run --all-files --show-diff-on-failure

  # ────────────── test ──────────────
  test:
    name: Test (${{ matrix.display-os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    # Linux x64 (self-hosted) keeps the 4-Python-version matrix for
    # fast PR feedback. macOS-arm64 + Windows-x64 each get a single
    # Python 3.13 leg, gated experimental until proven stable.
    # Mirrors the cross-OS pattern across the kaos-* family.
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x64 (self-hosted) — full Python matrix ──
          - python-version: "3.13"
            os: kaos-x64-16core
            display-os: linux-x64
            experimental: false
          - python-version: "3.14"
            os: kaos-x64-16core
            display-os: linux-x64
            experimental: false
          # Free-threaded build (PEP 703).
          - python-version: "3.14t"
            os: kaos-x64-16core
            display-os: linux-x64
            experimental: true
          # Pre-release of 3.15.
          - python-version: "3.15"
            os: kaos-x64-16core
            display-os: linux-x64
            experimental: true
          # ── macOS arm64 — single Python smoke ──
          - python-version: "3.13"
            os: macos-14
            display-os: macos-arm64
            experimental: true
          # ── Windows x64 — single Python smoke ──
          - python-version: "3.13"
            os: windows-latest
            display-os: windows-x64
            experimental: true
    continue-on-error: ${{ matrix.experimental }}
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          # Per-leg cache key including display-os so cross-OS legs
          # are independently cached.
          cache-suffix: test-${{ matrix.display-os }}-py${{ matrix.python-version }}

      - name: Install Python ${{ matrix.python-version }}
        # `--preview` lets `uv python install` resolve in-development
        # interpreters (3.15) and the free-threaded variant (3.14t).
        # No-op for stable versions.
        run: uv python install --preview ${{ matrix.python-version }}

      - name: Install C build deps (Python 3.15 only)
        # Several wheels don't ship cpython-3.15 binaries yet (3.15 is
        # pre-release through Oct 2026), so uv falls back to source
        # builds. Header packages required:
        #   - libxml2-dev / libxslt1-dev / zlib1g-dev — lxml (kaos-office's
        #     core OOXML parser dependency).
        #   - libjpeg-dev / libfreetype6-dev / liblcms2-dev / libtiff-dev
        #     — Pillow (the _imagingft text-rendering extension that
        #     ImageDraw / ImageFont require, plus the standard codec
        #     headers). Pulled in transitively via kaos-content[images].
        # Drop the whole step once these projects ship 3.15 wheels.
        if: matrix.python-version == '3.15'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxml2-dev libxslt1-dev zlib1g-dev \
            libjpeg-dev libfreetype6-dev \
            liblcms2-dev libtiff-dev

      - name: Install dependencies
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Run unit tests with coverage
        # `shell: bash` for `\` continuations on Windows.
        shell: bash
        run: |
          uv run pytest tests/unit/ \
            --cov=kaos_office \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        if: always() && !matrix.experimental
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.display-os }}-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14

  # ────────────── min-deps ──────────────
  # Resolve and test against the minimum declared versions of every
  # dependency so we catch "we said >=X but actually need X+1" drift.
  # Runs on 3.13 only; 3.14 is the cutting edge and may not have wheels
  # for very old dep versions.
  min-deps:
    name: Test against minimum dependencies
    runs-on: kaos-x64-16core
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          # min-deps resolves with --resolution=lowest-direct, which
          # downloads materially different wheel versions than the
          # other 3.13 jobs. Separate cache so the two don't fight
          # over the same key.
          cache-suffix: min-deps-py3.13

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install with lowest-direct resolution
        run: uv sync --group dev --resolution=lowest-direct --python 3.13

      - name: Run unit tests
        run: |
          uv run pytest tests/unit/ \
            --no-cov \
            -q

  # ────────────── build + wheel smoke test ──────────────
  build:
    name: Build distribution + smoke test
    runs-on: kaos-x64-16core
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          cache-suffix: build-py3.13

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Build wheel + sdist
        run: uv build

      - name: Verify metadata (twine check)
        run: uvx --from twine twine check --strict dist/*

      - name: Smoke-test the built wheel in a clean venv
        # Install the actually-built wheel (not the source tree) into a
        # clean Python environment and exercise the public API. This
        # catches packaging bugs that source-tree tests miss: missing
        # data files, broken `__init__.py` exports, sdist-only files
        # that reference dist-only paths, etc.
        run: |
          uv venv --python 3.13 /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python dist/kaos_office-*-py3-none-any.whl
          /tmp/smoke/bin/python -c "
          import kaos_office
          assert kaos_office.__version__, 'version missing from wheel'
          # Top-level public API surface imports without error.
          from kaos_office import (
              DocxExtractionError,
              DocxMetadataTool,
              GetDocxMarkdownTool,
              GetDocxTextTool,
              GetSheetXlsxTool,
              GetSlideTool,
              KaosOfficeError,
              ListSheetsXlsxTool,
              ListSlidesTool,
              ParseDocxTool,
              ParsePptxTool,
              ParseXlsxTool,
              PptxExtractionError,
              SearchDocxTool,
              WriteDocxTool,
              WritePptxTool,
              WriteXlsxTool,
              XlsxExtractionError,
              XlsxMetadataTool,
              extract_to_markdown,
              parse_docx,
              parse_pptx,
              register_office_tools,
              search_document,
          )
          # Subpackage re-exports (KO-007).
          from kaos_office.docx import write_docx, write_docx_bytes
          from kaos_office.pptx import (
              OverflowMode,
              get_slide_count,
              get_slide_notes,
              get_slide_text,
              list_slides,
              write_pptx,
              write_pptx_bytes,
          )
          from kaos_office.xlsx import list_sheets, parse_xlsx, write_xlsx, write_xlsx_bytes
          assert len(kaos_office.__all__) >= 25
          # Read tools are read-only / idempotent / non-destructive / closed-world.
          for tool_cls in (
              ParseDocxTool, GetDocxTextTool, GetDocxMarkdownTool,
              DocxMetadataTool, SearchDocxTool,
              ParsePptxTool, ListSlidesTool, GetSlideTool,
              ParseXlsxTool, ListSheetsXlsxTool, GetSheetXlsxTool, XlsxMetadataTool,
          ):
              ann = tool_cls().metadata.annotations
              assert ann.readOnlyHint is True, tool_cls.__name__
              assert ann.idempotentHint is True, tool_cls.__name__
              assert ann.destructiveHint is False, tool_cls.__name__
              assert ann.openWorldHint is False, tool_cls.__name__
          # Write tools refuse silent overwrites (destructiveHint=False) but
          # are not idempotent and write to disk (openWorldHint=True).
          for tool_cls in (WriteDocxTool, WritePptxTool, WriteXlsxTool):
              ann = tool_cls().metadata.annotations
              assert ann.readOnlyHint is False, tool_cls.__name__
              assert ann.destructiveHint is False, tool_cls.__name__
              assert ann.idempotentHint is False, tool_cls.__name__
              assert ann.openWorldHint is True, tool_cls.__name__
          print(f'kaos-office {kaos_office.__version__}: public API OK ({len(kaos_office.__all__)} symbols)')
          "
          # Exercise the CLI entrypoint.
          /tmp/smoke/bin/kaos-office --help

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
